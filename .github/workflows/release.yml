name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish
        run: >
          dotnet publish src/TimecodeBridge/TimecodeBridge.csproj
          -c Release
          --self-contained
          -r win-x64
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Rename exe
        run: Rename-Item publish/TimecodeBridge.exe "TimecodeBridge-${{ github.ref_name }}.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: publish/TimecodeBridge-${{ github.ref_name }}.exe
